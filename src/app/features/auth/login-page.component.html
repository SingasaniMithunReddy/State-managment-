<section class="section auth-wrap">
  <div class="container auth-container">
    <article class="card auth-card">
      <span class="badge">Login</span>
      <h1>Welcome back</h1>
      <p class="muted">This is a frontend-only demo form with no real authentication yet.</p>

      <form class="auth-form" (submit)="$event.preventDefault(); submit()">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" class="input" type="email" placeholder="name@company.com">
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary full" type="submit">Sign in</button>
      </form>

      @if (submitted()) {
        <p class="notice">Demo only: connect this screen to your auth service later.</p>
      }

      <p class="muted switch-copy">
        Need an account?
        <a routerLink="/register">Create one</a>
      </p>
    </article>
  </div>
</section>
