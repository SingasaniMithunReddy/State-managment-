<header class="site-header">
  <div class="container nav-shell">
    <a class="brand" routerLink="/">
      <span class="brand-mark">H</span>
      <span>
        <strong>HireJob.ai</strong>
        <small>Angular 20 demo portal</small>
      </span>
    </a>

    <nav class="nav-links" aria-label="Primary navigation">
      <a routerLink="/jobs" routerLinkActive="active">Jobs</a>
      <a routerLink="/employers" routerLinkActive="active">Employers</a>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/case-study" routerLinkActive="active">Case study</a>
      <a routerLink="/applications" routerLinkActive="active">
        Applications
        <span class="count">{{ applications.count() }}</span>
      </a>
      <a routerLink="/saved" routerLinkActive="active">
        Saved
        <span class="count">{{ savedJobs.count() }}</span>
      </a>
    </nav>

    <div class="actions">
      <a class="btn btn-secondary" routerLink="/login">Login</a>
      <a class="btn btn-primary" routerLink="/register">Get started</a>
    </div>
  </div>
</header>
